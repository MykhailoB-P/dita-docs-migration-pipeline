name: Docs Validation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-validation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Execute Python Validator
      run: python validate_xml.py

    - name: Lint Markdown Documentation
      uses: davidanson/markdownlint-cli2-action@v16
      with:
        globs: '**/*.md'
    
    - name: Check Markdown Links
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes' # Only log errors and failures to keep output clean